<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <title>{{ title or 'MiniReddit' }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light border-bottom fixed-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand mb-0" href="/">MiniReddit</a>
            <div>
                {% if current_user.is_authenticated %}
                <a class="btn btn-outline-secondary btn-sm mr-2" href="/create_post/{{theme}}">Новый пост</a>
                <span>{{current_user.username}}</span>
                <a class="btn btn-outline-danger btn-sm" href="/logout">Выход</a>
                {% else %}
                <a class="btn btn-outline-primary btn-sm mr-2" href="/login">Вход</a>
                <a class="btn btn-primary btn-sm" href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
<main role="main" class="container" style="padding-top:4.5rem;">
    <div class="alert alert-danger" role="alert" id="messages" hidden="true" align="center"></div>
    {% block content %}{% endblock %}
</main>
</body>
</html>
