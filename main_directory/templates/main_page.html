{% extends "base.html" %}

{% block content %}
{% for post in posts['posts'] %}
<article class="card mb-3">
    <div class="card-body">
        <div class="d-flex">
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-0">{{ post['author']}}</h6>
                        <small class="text-muted">{{ post['created_at'] }}</small></div>
                </div>
                <p class="mt-2 mb-2">{{ post['content'] }}</p>
                {% if post['image'] %} <img src="{{ post['image'] }}" alt="" class="img-fluid rounded mb-2"> {% endif %}
            </div>
        </div>
    </div>
</article>
{% endfor %}
{% endblock %}
