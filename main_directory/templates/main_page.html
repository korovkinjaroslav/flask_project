{% extends "base.html" %}

{% block content %}
{% for post in posts['posts'] %}
<article class="card mb-3">
    <div class="card-body">
        <div class="d-flex">
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-0">{{ post['author'] }}</h6>
                        <small class="text-muted">{{ post['created_at'] }}</small>
                    </div>
                </div>

                <p class="mt-2 mb-2">{{ post['content'] }}</p>
                {% if post['image'] %}
                <img src="{{ post['image'] }}" alt="" class="img-fluid rounded mb-2">
                {% endif %}

                <div class="d-flex align-items-center">
                    <form id="like-form-{{ post['id'] }}" action="/api/like/{{ post['id'] }}" method="post"
                          class="me-4">
                        <button type="button"
                                class="btn btn-sm btn-link p-0 like-btn"
                                aria-label="Лайк"
                                data-post-id="{{ post['id'] }}">
                            <img src="/static/img/like.svg" alt="Лайк" width="28" height="28">
                        </button>
                        <span id="likes-count-{{ post['id'] }}" class="ms-2">{{ post['likes_amount'] }}</span>
                    </form>

                    <a href="/later" class="btn btn-sm btn-link p-0 d-flex align-items-center" aria-label="Комментарий">
                        <img src="/static/img/comment.svg" alt="Комментарий" width="28" height="28">
                    </a>
                </div>

            </div>
        </div>
    </div>
</article>

{% endfor %}
<script>
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.like-btn');
  if (!btn) return;

  const postId = btn.dataset.postId;
  const form = document.getElementById(`like-form-${postId}`);
  if (!form) return;

  const countEl = document.getElementById(`likes-count-${postId}`);
  const prev = parseInt(countEl.textContent || '0', 10);
  countEl.textContent = prev + 1;
  btn.disabled = true;

  const formData = new FormData(form);
  const headers = {};

  try {
    const res = await fetch(form.action, {
      method: 'POST',
      credentials: 'same-origin',
      headers: headers,
      body: formData
    });

    if (!res.ok) throw new Error('Network response was not ok');

    const data = await res.json();
    if (data && typeof data.likes !== 'undefined') {
      countEl.textContent = data.likes;
    } else {
      countEl.textContent = prev;
      console.error('Invalid server response', data);
    }
  } catch (err) {
    countEl.textContent = prev;
    console.error('Like failed', err);
  } finally {
    btn.disabled = false;
  }
});
</script>

{% endblock %}
